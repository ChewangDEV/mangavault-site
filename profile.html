<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile | MangaVault</title>
  
  <link rel="icon" href="./image/favicon.ico">
  <link rel="apple-touch-icon" href="./image/icon-192.png">
  <link rel="stylesheet" href="./profile.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<main>
  <div class="profile-wrapper">

    <div class="profile-card">

      <button class="back-btn" onclick="goToCommunity()">
        ← Back to Community
      </button>
      
      <!-- USER INFO -->
      <div class="profile-header">
        <label for="avatarInput" class="avatar" id="profileAvatar">A</label>
        <input type="file" id="avatarInput" hidden>

        <div class="user-info">
          <h2 id="profileName">Username</h2>
          <p id="profileEmail">email@gmail.com</p>
        </div>
      </div>

      <!-- OPTIONS -->
      <div class="profile-options">
        <button onclick="editProfile()">
          <i class="ri-edit-line"></i> Edit Profile
        </button>

        <!-- 🔥 ADD THIS -->
        <button onclick="goToMyPosts()">
          <i class="ri-article-line"></i> My Posts
        </button>

        <button onclick="goToSaved()">
          <i class="ri-bookmark-line"></i> Saved Posts
        </button>
      </div>

      <!-- EDIT BOX -->
      <div id="editBox" class="edit-box">
        <input id="editInput" placeholder="Enter new username">
        <div class="edit-actions">
          <button onclick="saveName()">Save</button>
          <button onclick="closeEdit()">Cancel</button>
        </div>
      </div>

      <!-- LOGOUT -->
      <button class="logout-btn" onclick="logout()">
        <i class="ri-logout-box-line"></i> Logout
      </button>

    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="profile.js"></script>
</body>
</html>
